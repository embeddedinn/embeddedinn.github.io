<!-- _includes/video.html : self-playing, self-looping, muted inline video with caption -->
<div class="image-wrapper">
    <video
        {% if include.width %}width="{{ include.width }}"{% else %}width="480"{% endif %}
        autoplay loop muted playsinline preload="metadata"
        {% if include.poster %}poster="{{ site.url }}{{ site.baseurl }}/{{ include.poster }}"{% endif %}
        style="max-width:100%;height:auto;"
        {% if include.caption %}aria-label="{{ include.caption }}"{% endif %}>
        <source src="{{ site.url }}{{ site.baseurl }}/{{ include.mp4 }}" type="video/mp4">
        {% if include.caption %}{{ include.caption }}{% endif %}
    </video>

    {% if include.caption %}
        <p class="image-caption">{{ include.caption }}</p>
    {% endif %}
</div>
